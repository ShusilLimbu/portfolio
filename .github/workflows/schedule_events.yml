name: Schedule Events in GitHub Actions

on:
  schedule:
    - cron: '4 17 * * *'
  pull_request:
    types: [opened,reopened]
  issues:
    types: [opened, closed]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        run: action/checkout@v4
      - name: Run Script
        run: echo "Hello, Scheduled Workflow!"
