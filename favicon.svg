<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>

  <!-- Bold simplified k8s hex-style core -->
  <g fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round">
    
    <!-- Outer hexagon -->
    <polygon points="50,18 78,34 78,66 50,82 22,66 22,34"/>

    <!-- Center node -->
    <circle cx="50" cy="50" r="8" fill="#22c55e"/>

    <!-- Strong spokes -->
    <line x1="50" y1="50" x2="50" y2="25"/>
    <line x1="50" y1="50" x2="50" y2="75"/>
    <line x1="50" y1="50" x2="30" y2="50"/>
    <line x1="50" y1="50" x2="70" y2="50"/>
  </g>
</svg>